version: '3.8'

services:
  frontend:
    build:
      context: ./google-antigravity/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./google-antigravity/backend
      dockerfile: Dockerfile
    environment:
      - DB_HOST=db
      - DB_NAME=google_antigravity
      - DB_USER=root
      - DB_PASS=rootpassword
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=google_antigravity
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Inicializa la base de datos automáticamente
      - ./google-antigravity/backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data:
