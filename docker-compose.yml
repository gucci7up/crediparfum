version: '3.8'

services:
  frontend:
    build:
      context: ./google-antigravity/frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    networks:
      - dokploy-network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crediparfum-http.rule=Host(`crediparfum.salamihost.lat`)"
      - "traefik.http.routers.crediparfum-http.entrypoints=web"
      - "traefik.http.routers.crediparfum-https.rule=Host(`crediparfum.salamihost.lat`)"
      - "traefik.http.routers.crediparfum-https.entrypoints=websecure"
      - "traefik.http.routers.crediparfum-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.crediparfum.loadbalancer.server.port=80"

  backend:
    build:
      context: ./google-antigravity/backend
      dockerfile: Dockerfile
    environment:
      - DB_HOST=db
      - DB_NAME=google_antigravity
      - DB_USER=root
      - DB_PASS=rootpassword
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=google_antigravity
    volumes:
      - db_data:/var/lib/mysql
      # Inicializa la base de datos automáticamente
      - ./google-antigravity/backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data:

networks:
  dokploy-network:
    external: true
